<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="1400" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B4D3D9"/>
      <stop offset="0.55" stop-color="#F2EAE0"/>
      <stop offset="1" stop-color="#B4D3D9"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="white" stop-opacity="0.85"/>
      <stop offset="1" stop-color="white" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#0C1B33" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- soft background -->
  <rect width="1400" height="900" rx="46" fill="url(#bg)"/>
  <circle cx="210" cy="220" r="170" fill="#F2EAE0" fill-opacity="0.55"/>
  <circle cx="1220" cy="210" r="210" fill="#B4D3D9" fill-opacity="0.45"/>
  <circle cx="1180" cy="760" r="240" fill="#F2EAE0" fill-opacity="0.50"/>

  <!-- monitor card -->
  <g filter="url(#shadow)">
    <rect x="210" y="250" width="760" height="420" rx="26" fill="white" fill-opacity="0.16"/>
    <rect x="235" y="275" width="710" height="330" rx="22" fill="#0C1B33" fill-opacity="0.85"/>
    <rect x="250" y="290" width="280" height="140" rx="16" fill="#B4D3D9" fill-opacity="0.22"/>
    <rect x="545" y="290" width="385" height="140" rx="16" fill="#F2EAE0" fill-opacity="0.18"/>
    <rect x="250" y="440" width="680" height="150" rx="18" fill="#B4D3D9" fill-opacity="0.16"/>

    <!-- faux scans -->
    <path d="M284 318h212v84H284z" fill="#0B1324" fill-opacity="0.55"/>
    <path d="M294 328h192v64H294z" fill="#B4D3D9" fill-opacity="0.22"/>
    <path d="M572 318h330v84H572z" fill="#0B1324" fill-opacity="0.55"/>
    <path d="M582 328h310v64H582z" fill="#F2EAE0" fill-opacity="0.16"/>
    <path d="M284 466h618v98H284z" fill="#0B1324" fill-opacity="0.55"/>
    <path d="M300 482h140v66H300z" fill="#B4D3D9" fill-opacity="0.20"/>
    <path d="M456 482h140v66H456z" fill="#F2EAE0" fill-opacity="0.16"/>
    <path d="M612 482h140v66H612z" fill="#B4D3D9" fill-opacity="0.18"/>
    <path d="M768 482h118v66H768z" fill="#F2EAE0" fill-opacity="0.14"/>

    <!-- monitor base -->
    <rect x="520" y="620" width="140" height="20" rx="10" fill="white" fill-opacity="0.42"/>
    <rect x="570" y="640" width="40" height="65" rx="16" fill="white" fill-opacity="0.32"/>
    <rect x="490" y="700" width="260" height="22" rx="11" fill="white" fill-opacity="0.38"/>
  </g>

  <!-- person silhouette -->
  <g filter="url(#shadow)">
    <path d="M1040 690c0-110 60-190 160-190s160 80 160 190v70H1040v-70z" fill="white" fill-opacity="0.18"/>
    <circle cx="1200" cy="465" r="78" fill="white" fill-opacity="0.20"/>
    <path d="M1165 520c-18 26-28 54-28 86v164h126V606c0-30-9-58-27-84-23 12-48 18-71 18s-46-6-70-20z" fill="url(#glass)"/>
    <path d="M1250 505c18 10 34 26 46 48l-70 36-18-28 42-56z" fill="#B4D3D9" fill-opacity="0.55"/>
  </g>

  <!-- glass shine -->
  <path d="M70 120c260-150 520-170 760-60 90 40 170 96 240 170" stroke="white" stroke-opacity="0.28" stroke-width="26" stroke-linecap="round"/>
</svg>

