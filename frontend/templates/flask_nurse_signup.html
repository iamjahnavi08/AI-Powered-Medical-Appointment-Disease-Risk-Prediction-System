<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIHealth Hub - Nurse Signup</title>
  <style>
    :root {
      --bg-a: #f0f7fb;
      --bg-b: #d9ebf1;
      --card: rgba(255, 255, 255, 0.9);
      --line: #c8dde4;
      --text: #164852;
      --muted: #58757d;
      --accent: #1c8a94;
      --accent-dark: #146870;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 18%, rgba(95, 201, 193, 0.18), transparent 28%),
        radial-gradient(circle at 88% 80%, rgba(56, 138, 186, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: 0 22px 34px rgba(20, 73, 83, 0.12);
    }
    h1 { margin: 0; font-size: 2.2rem; }
    p { color: var(--muted); line-height: 1.7; }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #23525d;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid #cadde2;
      font: inherit;
      background: #f8fcfd;
    }
    input:focus {
      outline: none;
      border-color: #7cc6ce;
      box-shadow: 0 0 0 3px rgba(54, 154, 166, 0.16);
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .errors {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #efc3c3;
      background: #fff1f1;
      color: #8a2c2c;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #1b6f78;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='page-animations.css') }}">
</head>
<body>
  <main class="card">
    <h1>Create Nurse Account</h1>
    <p>Register a nurse account to maintain patient vitals, glucose levels, and official intake records before doctor review.</p>

    {% if errors %}
    <div class="errors">
      {% for error in errors %}
      <div>{{ error }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post">
      <label for="nurse_id">Nurse ID</label>
      <input id="nurse_id" name="nurse_id" value="{{ form_data.nurse_id }}" />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" />

      <label for="confirm_password">Confirm Password</label>
      <input id="confirm_password" name="confirm_password" type="password" />

      <button type="submit">Create Account</button>
    </form>

    <a href="/nurse/login">Already have a nurse account? Login</a>
  </main>
  <script src="{{ url_for('static', filename='page-animations.js') }}"></script>
</body>
</html>
